<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>윤향 보카 1.0</title>
<style>
  :root{
    --paper:#f4f5f7; --card:#ffffff; --ink:#1b2440; --sub:#5a6480;
    --line:#e2e5ec; --accent:#2f6f6b; --accent-w:#e8f1f0;
    --shadow:0 1px 2px rgba(20,30,60,.06),0 8px 24px rgba(20,30,60,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--paper);color:var(--ink);min-height:100vh;line-height:1.5;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    display:flex;align-items:center;
  }
  .wrap{max-width:520px;margin:0 auto;padding:40px 20px}
  .brand{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--sub);margin-bottom:8px;text-align:center}
  h1{font-size:30px;margin:0 0 6px;font-weight:800;letter-spacing:-.01em;text-align:center}
  h1 span{color:var(--accent)}
  .sub{text-align:center;color:var(--sub);font-size:14px;margin-bottom:36px}
  .cards{display:flex;flex-direction:column;gap:14px}
  a.tile{
    display:flex;align-items:center;gap:16px;text-decoration:none;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:22px;box-shadow:var(--shadow);transition:transform .12s;
  }
  a.tile:active{transform:translateY(1px)}
  .icon{
    flex:none;width:52px;height:52px;border-radius:14px;background:var(--accent-w);
    display:grid;place-items:center;font-size:24px;color:var(--accent);
  }
  .tile .t{font-size:18px;font-weight:800;margin-bottom:3px}
  .tile .d{font-size:13px;color:var(--sub)}
  .arrow{margin-left:auto;color:var(--sub);font-size:20px}
  .foot{text-align:center;margin-top:28px;font-size:12px;color:var(--sub)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Yoonhwang Voca 1.0</div>
  <h1>윤향 보카 <span>학습</span></h1>
  <div class="sub">60개 레슨 · 8,085개 표제어</div>

  <div class="cards">
    <a class="tile" href="yoonhwang_flashcard.html">
      <div class="icon">🗂️</div>
      <div>
        <div class="t">플래시카드</div>
        <div class="d">카드 뒤집으며 암기</div>
      </div>
      <div class="arrow">→</div>
    </a>
    <a class="tile" href="yoonhwang_quiz.html">
      <div class="icon">✅</div>
      <div>
        <div class="t">퀴즈</div>
        <div class="d">4지선다로 실력 확인</div>
      </div>
      <div class="arrow">→</div>
    </a>
  </div>

  <div class="foot">레슨 범위를 골라 원하는 만큼만 학습하세요</div>
</div>
</body>
</html>

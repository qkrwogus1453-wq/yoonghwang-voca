<script>
'use strict';
var IDX=null, CACHE={}, POOL={words:[],phrases:[],all:[]}, SET=[], LEX={}, ROOTS=null;

var Q=[], qi=0, ans=[], wrongs=[], fin=false, sel={};
var SRC='normal';   // normal | retry | bank
var BANK={quiz:{}, syn:{}};   // ž¶ČÍįĀ Ž≥ĶžäĶžö© ŽąĄž†Ā žė§ŽčĶ: mode -> {word: item}
var STATS={};   // žě•Íłį ŪÜĶÍ≥Ą: word -> {w, m, s, p, r, id, vol, day, type, wrong, right}
var CI=0;

function $(i){return document.getElementById(i);}
function msg(t,c){var m=$('msg');m.textContent=t;m.className=c||'load';m.style.display='block';}
function hide(){$('msg').style.display='none';}
function show(id){
  ['setup','cardscr','qscr','resscr'].forEach(function(s){$(s).classList.remove('on');});
  $(id).classList.add('on');
  window.scrollTo(0,0);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ŽúĽ ŪÜ†ŪĀįŪôĒ (ž≤ę ÍįąŽěė Íłįž§Ä)
var _tkCache={};
function mtoks(m){
  if(_tkCache[m]) return _tkCache[m];
  var t = m.split(/[\/;]/)[0];
  t = t.replace(/\([^)]*\)|\[[^\]]*\]/g,' ').replace(/[,¬∑]/g,' ');
  var out={}, n=0;
  t.split(/\s+/).forEach(function(c){
    if(!/[ÍįÄ-Ūě£]/.test(c)) return;
    var b=c.replace(/(ŪēėŽč§|ŽźėŽč§|žčúŪā§Žč§|žä§Žü¨žöī|žä§ŽüĹŽč§|Ž°≠Žč§|ž†ĀžĚł|žĚė|Ūēú|ŽäĒ|žĚĄ|Ž•ľ|žĚī|ÍįÄ|Ūē®|žĚĆ)$/,'');
    if(b.length>=2 && !out[b]){ out[b]=1; n++; }
  });
  var r={set:out, n:n};
  _tkCache[m]=r;
  return r;
}
// ŽĎź ŽúĽžĚī ŽĄąŽ¨ī ŽĻĄžä∑ŪēúÍįÄ (Jaccard >= 0.5)
function tooSimilar(a,b){
  var A=mtoks(a), B=mtoks(b);
  if(!A.n||!B.n) return false;
  var inter=0;
  for(var k in A.set) if(B.set[k]) inter++;
  var uni=A.n+B.n-inter;
  return uni>0 && (inter/uni) >= 0.5;
}

function defOf(t){
  var k=String(t).toLowerCase().trim();
  return LEX[k] || '';
}
// ŪēīžĄ§žö© ŽŹôžĚėžĖī Ž™©Ž°Ě (ŽúĽ žóÜžĚī ŽŹôžĚėžĖīŽßĆ ‚ÄĒ ŽúĽžĚÄ žĚīŽĮł žúĄžóź ŪĎúžčúŽź®)
function synHTML(arr){
  return arr.map(function(t){
    return '<span class="sy">'+esc(t)+'</span>';
  }).join('<span class="sep">¬∑</span>');
}

// žö©Ž≤ē(Ž¨łŽ≤ē/Ž∂Ąžēľ) ŪĎúžčú
function usageHTML(w){
  var h='';
  if(w.ug && w.ug.length) h += '<div class="ug">'+w.ug.map(esc).join(' ¬∑ ')+'</div>';
  if(w.uf && w.uf.length) h += '<div class="uf">'+w.uf.map(esc).join(' ¬∑ ')+'</div>';
  return h;
}

// Í≥†ž†ē ž†ĄžĻėžā¨ ŪĎúžčú
function prepHTML(w){
  if(!w.pp || !w.pp.length) return '';
  return '<div class="pp">'+w.pp.map(function(t){
    return '<b>'+esc(w.w)+' '+esc(t)+'</b>';
  }).join('<span class="sep">¬∑</span>')+'</div>';
}

// žā¨žßÄžĄ†Žč§ ŪēīžĄ§: ŽúĽ ž†Ąž≤ī + ŽŹôžĚėžĖī ž†Ąž≤ī (ÍĶ¨Ž∂Ą žóÜžĚī)
function renderFlat(w){
  var h = '<div class="m">'+esc(w.m)+'</div>';
  h += usageHTML(w);
  h += prepHTML(w);
  if(w.s && w.s.length) h += '<div class="s">'+synHTML(w.s)+'</div>';
  return h;
}

// ŽúĽ-ŽŹôžĚėžĖī žĆćžĚĄ ž§Ąž§ĄžĚī Ž†ĆŽćĒ (ŪēėžĚīŽĚľžĚīŪäłŪē† ŽúĽ žßÄž†ē ÍįÄŽä•)
function renderPairs(w, hl){
  if(!w.p || !w.p.length){
    var h='<div class="m">'+esc(w.m)+'</div>';
    if(w.s&&w.s.length) h+='<div class="s">'+synHTML(w.s)+'</div>';
    return h;
  }
  var out='';
  w.p.forEach(function(p){
    var on = (hl && p.d===hl);
    out += '<div class="pr'+(on?' hl':'')+'">'
         + '<span class="pd">'+esc(p.d)+'</span>'
         + '<span class="ps">'+synHTML(p.s)+'</span></div>';
  });
  out += usageHTML(w);
  out += prepHTML(w);
  // ŽŹôžĚėžĖīÍįÄ žóÜŽäĒ ŽāėŽ®łžßÄ ŽúĽ
  var covered = w.p.map(function(p){return p.d;}).join(' / ');
  if(w.m && w.m !== covered){
    var rest = w.m.split(' / ').filter(function(t){
      return !w.p.some(function(p){ return p.d.indexOf(t)>=0; });
    });
    if(rest.length) out += '<div class="pr"><span class="pd">'+esc(rest.join(' / '))+'</span></div>';
  }
  return out;
}
function shuf(a){var r=a.slice();for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=r[i];r[i]=r[j];r[j]=t;}return r;}

// ---------- ŽąĄž†Ā žė§ŽčĶ ž†Äžě• ----------
var BKEY='voca_bank_v1';
function bankLoad(){
  try{
    var raw=localStorage.getItem(BKEY);
    if(raw){
      var d=JSON.parse(raw);
      if(d && d.quiz && d.syn) BANK=d;
    }
  }catch(e){ BANK={quiz:{}, syn:{}}; }
}

}

// ---------- žě•Íłį žė§ŽčĶ ŪÜĶÍ≥Ą (ŽßěŪėÄŽŹĄ ÍłįŽ°Ě žú†žßÄ) ----------
var SKEY='voca_stats_v1';
function statsLoad(){
  try{
    var raw=localStorage.getItem(SKEY);
    if(raw){ var d=JSON.parse(raw); if(d) STATS=d; }
  }catch(e){ STATS={}; }
}
function statsSave(){
  try{ localStorage.setItem(SKEY, JSON.stringify(STATS)); }catch(e){}
}
function statsWrong(w){
  var k=w.w;
  if(!STATS[k]) STATS[k]={w:w.w, m:w.m, s:w.s, p:w.p, r:w.r, id:w.id, vol:w.vol, day:w.day, type:w.type, pp:w.pp, ug:w.ug, uf:w.uf, wrong:0, right:0};
  STATS[k].wrong++;
  statsSave();
}
function statsRight(w){
  var k=w.w;

}
function statsList(){
  var o=[];
  for(var k in STATS) o.push(STATS[k]);
  // ŪčÄŽ¶į Ūöüžąė ŽßéžĚÄ žąú, ÍįôžúľŽ©ī ž†ēŽčĶ ž†ĀžĚÄ žąú
  o.sort(function(a,b){ return (b.wrong-a.wrong) || (a.right-b.right); });

}
function bankAdd(mode, w){
  if(mode!=='quiz' && mode!=='syn') return;

}

}

}

// žēĪžĚĄ žóī ŽēĆŽßąŽč§ žÉą Ž≤Ąž†Ą ŪÉúÍ∑ł žÉĚžĄĪ ‚Üí Ūē≠žÉĀ žĶúžč† ŪĆĆžĚľ Ž°úŽďú (žļźžčú žöįŪöĆ)
var VER = (window.__voca_ver = window.__voca_ver || (Date.now().toString(36)));
var APP_VER = '2026.07.20g';  // žĚī ŪĆĆžĚľžĚė Ž≤Ąž†Ą. ver.jsonÍ≥ľ ŽĻĄÍĶźŪēī žÉą Ž≤Ąž†Ą ÍįźžßÄ
function loadJ(p){
  var url = p + (p.indexOf('?')<0 ? '?' : '&') + 'v=' + VER;
  return fetch(url,{cache:'no-store'}).then(function(r){
    if(!r.ok) throw new Error(p+' (HTTP '+r.status+')');
    return r.json();
  });
}
function getDay(k){
  if(CACHE[k]) return Promise.resolve(CACHE[k]);
  return loadJ('data/'+k+'.json').then(function(it){
    if(!Array.isArray(it)||!it.length) throw new Error(k+'.jsonžĚī ŽĻĄžóąžäĶŽčąŽč§');
    for(var i=0;i<it.length;i++){
      if(!it[i].w||!it[i].m) throw new Error(k+'.json: Ūē≠Ž™© '+(i+1)+' žÜźžÉĀ');
    }
    CACHE[k]=it;
    return it;
  });
}

function checkVersion(){
  // ver.jsonžĚÄ žļźžčúŽ•ľ žēą ŪÉÄŽĮÄŽ°ú(VER ŽćēŽ∂Ą) Ūē≠žÉĀ žĶúžč†. APP_VERÍ≥ľ Žč§Ž•īŽ©ī žÉą Ž≤Ąž†ĄžĚī žė¨ŽĚľžė® Í≤É.
  return loadJ('data/ver.json').then(function(d){
    if(d && d.v && d.v !== APP_VER){
      // ŪėĄžě¨ URLžóź žĚīŽĮł žĚī Ž≤Ąž†Ą žŅľŽ¶¨ÍįÄ Ž∂ôžĖī žěąžúľŽ©ī žě¨žčúŽŹĄ žēą Ūē®(Ž¨īŪēú Žį©žßÄ)
      var cur = new URLSearchParams(location.search).get('app');
      if(cur !== d.v){
        var u = location.pathname + '?app=' + encodeURIComponent(d.v);
        location.replace(u);  // žÉą ž£ľžÜĆ ‚Üí žā¨ŪĆĆŽ¶¨ÍįÄ žĶúžč† HTMLžĚĄ ÍįÄž†łžėī
        return false;
      }
    }
    return true;
  }).catch(function(){ return true; });  // ver.json žóÜžĖīŽŹĄ žēĪžĚÄ ž†ēžÉĀ ŽŹôžěĎ
}

function boot(){

    if(ok===false) return;  // Ž¶¨Ž°úŽďú ž§Ď
    startBoot();
  });

function startBoot(){
  loadJ('data/index.json').then(function(idx){
    if(!Array.isArray(idx)||!idx.length) throw new Error('index.jsonžĚī ŽĻĄžóąžäĶŽčąŽč§');

    // ŽŹôžĚėžĖī ŽúĽ žā¨ž†Ą (žóÜžĖīŽŹĄ žēĪžĚÄ ŽŹôžěĎ)
    loadJ('data/lex.json').then(function(d){ LEX=d||{}; }).catch(function(){ LEX={}; });
    loadJ('data/roots.json').then(function(d){ ROOTS=d||[]; }).catch(function(){ ROOTS=[]; });
  }).catch(function(e){
    msg('‚ĚĆ ŽćįžĚīŪĄįŽ•ľ Ž∂ąŽü¨žė§žßÄ Ž™ĽŪĖąžäĶŽčąŽč§.\n\n'+e.message+'\n\ndata ŪŹīŽćĒÍįÄ žĚī ŪĆĆžĚľÍ≥ľ ÍįôžĚÄ žúĄžĻėžóź žěąŽäĒžßÄ ŪôēžĚłŪēėžĄłžöĒ.','err');
  });
}

// ž∂úž†ú ŽĆÄžÉĀ(Žč®žĖī/ŪĎúŪėĄ/ŽĎėŽč§)žóź ŽßěÍ≤Ć Ūē≠Ž™© ÍĪįŽ•īÍłį
function filterTarget(items){
  if(st.target==='word') return items.filter(function(x){return x.type==='word';});
  if(st.target==='phrase') return items.filter(function(x){return x.type==='phrase';});
  return items.slice();  // both
}

function keys(){
  if(!st.cum) return [st.key];
  var o=[];
  for(var i=0;i<IDX.length;i++){ o.push(IDX[i].key); if(IDX[i].key===st.key) break; }
  return o;
}

function stat(){
  var ks=keys();
  var ds=IDX.filter(function(d){return ks.indexOf(d.key)>=0;});
  var n=0,w=0,sy=0,r=0;
  ds.forEach(function(d){n+=d.n;w+=d.words;sy+=d.syn;r+=d.root;});
  var pre = st.cum ? 'ūüďĖ <b>ŽąĄž†Ā</b> ‚ÄĒ ' : '';
  $('dstat').innerHTML = pre+'<b>'+n+'</b>Íįú ¬∑ Žč®žĖī '+w+' ¬∑ ŽŹôžĚėžĖī '+sy+' ¬∑ žĖīžõź '+r;
  $('cum').style.background = st.cum ? '#e94560' : '#0f3460';

  // ŪĒĆŽěėžčúžĻīŽďú žĄłŪäł žėĶžÖė
  var isCard = st.mode==='card';
  $('fset').style.display = isCard ? '' : 'none';
  $('fnum').style.display = isCard ? 'none' : '';
  if(isCard){
    var base = st.target==='phrase' ? (n-w) : (st.target==='both' ? n : w);
    var sel=$('sset'); sel.innerHTML='';
    var cnt=Math.ceil(base/25);
    for(var i=0;i<cnt;i++){
      var o=document.createElement('option');
      o.value=i;
      o.textContent='žĄłŪäł '+(i+1)+' ('+(i*25+1)+'~'+Math.min((i+1)*25,base)+')';
      sel.appendChild(o);
    }
    st.set=0;
  }
}

function fetchItems(){
  return Promise.all(keys().map(getDay)).then(function(cs){
    var it=[];
    cs.forEach(function(c){ it=it.concat(c); });
    return it;
  });
}

function start(){
  SRC='normal';
  $('go').disabled=true;
  msg('Ž∂ąŽü¨žė§ŽäĒ ž§Ď‚Ä¶','load');
  fetchItems().then(function(items){
    var words=filterTarget(items);
    // žė§ŽčĶ ŪíÄ: Žč®žĖī žė§ŽčĶžĚÄ Žč®žĖīŽĀľŽ¶¨, ŪĎúŪėĄ žė§ŽčĶžĚÄ ŪĎúŪėĄŽĀľŽ¶¨ ŽĹĎŽŹĄŽ°Ě Ž∂ĄŽ¶¨ ž†Äžě•
    POOL = {
      words: items.filter(function(x){return x.type==='word';}),
      phrases: items.filter(function(x){return x.type==='phrase';}),
      all: items.slice()
    };
    hide();
    $('go').disabled=false;

    if(st.mode==='card'){
      if(!words.length) throw new Error('Žč®žĖīÍįÄ žóÜžäĶŽčąŽč§');
      SET=words.slice(st.set*25,(st.set+1)*25);
      if(!SET.length) throw new Error('žĚī žĄłŪäłžóź Žč®žĖīÍįÄ žóÜžäĶŽčąŽč§');
      CI=0;
      show('cardscr');
      drawCard();
      return;
    }

    if(st.mode==='browse'){
      var bw=words.filter(function(x){return x.s&&x.s.length;});
      if(!bw.length) throw new Error('ŽŹôžĚėžĖīÍįÄ žěąŽäĒ Žč®žĖīÍįÄ žóÜžäĶŽčąŽč§');
      drawBrowse(bw);
      show('browsescr');
      return;
    }

    if(st.mode==='roots'){
      drawRoots('');
      show('rootscr');
      return;
    }

    if(st.mode==='write'){
      var ww=words.filter(function(x){return x.s&&x.s.length;});
      if(ww.length<1) throw new Error('ŽŹôžĚėžĖīÍįÄ žěąŽäĒ Ūē≠Ž™©žĚī žóÜžäĶŽčąŽč§');
      var wn=st.n===0?ww.length:Math.min(st.n,ww.length);
      startWrite(shuf(ww).slice(0,wn));
      return;
    }

    var target=words;
    if(target.length<4) throw new Error('Ūē≠Ž™©žĚī '+target.length+'ÍįúŽŅźžěÖŽčąŽč§');
    var n=st.n===0?target.length:Math.min(st.n,target.length);
    launch(shuf(target).slice(0,n));
  }).catch(function(e){
    $('go').disabled=false;
    msg('‚ĚĆ '+e.message,'err');
  });
}

// Ž¨łŪē≠ ŽįįžóīŽ°ú ŪÄīž¶ą žčúžěĎ (POOLžĚÄ žĚīŽĮł žĄ§ž†ēŽŹľ žěąžĖīžēľ Ūē®)
function launch(list){
  if(st.mode==='syn'){
    // ŽŹôžĚėžĖī žěąžúľŽ©ī ŽŹôžĚėžĖī Žß§žĻ≠, žóÜžúľŽ©ī ŽúĽ Žßěž∂ĒÍłįŽ°ú žĄěžĖīžĄú ž∂úž†ú
    Q = list.map(function(w){
      var hasSyn = (w.p && w.p.some(function(pr){return pr.s&&pr.s.length;})) || (w.s&&w.s.length);
      return hasSyn ? buildSyn(w) : buildQuiz(w);
    });
  } else {
    Q = list.map(buildQuiz);
  }
  qi=0; ans=new Array(Q.length).fill(null); wrongs=[]; fin=false;
  hide();
  show('qscr');
  draw();
  sessionSave();
}

var SESKEY='voca_session_v2';
function sessionSave(){
  if(fin || !Q.length){ sessionClear(); return; }
  try{
    // QžĚė ÍįĀ Ž¨łž†úŽ•ľ žě¨ÍĶ¨žĄĪ ÍįÄŽä•Ūēú ŪėēŪÉúŽ°ú žßĀŽ†¨ŪôĒ
    var qd = Q.map(function(q){
      return {
        wid: q.w.id, wkey: q.w.w,
        opts: q.opts.map(function(o){
          return {t:o.t, ok:o.ok, sense:o.sense||'', def:o.def||'', srcw:o.srcw||''};
        }),
        ans: (q.ans!==undefined?q.ans:null),
        need: (q.need!==undefined?q.need:null),
        isPhrase: (q.isPhrase!==undefined?q.isPhrase:null),
        kind: q.kind
      };
    });
    var data={ mode:st.mode, key:st.key, cum:st.cum, src:SRC, qi:qi, ans:ans, wrongs:wrongs, Q:qd, ts:Date.now() };
    localStorage.setItem(SESKEY, JSON.stringify(data));
  }catch(e){}
}
function sessionClear(){
  try{ localStorage.removeItem(SESKEY); }catch(e){}
}
function sessionHas(){
  try{
    var raw=localStorage.getItem(SESKEY);
    if(!raw) return null;
    var d=JSON.parse(raw);
    if(!d||!d.Q||!d.Q.length) return null;
    // ŪēėŽāėŽĚľŽŹĄ žēą ŪĎľ Ž¨łž†úÍįÄ Žā®žēĄ žěąžĖīžēľ žĚīžĖī ŪíÄ žĚėŽĮłÍįÄ žěąžĚĆ
    var undone=d.ans.some(function(a){return a===null;});
    if(!undone) return null;
    return d;
  }catch(e){ return null; }
}
function sessionResume(){
  var d=sessionHas();
  if(!d) return false;
  st.mode=d.mode; st.key=d.key; st.cum=d.cum; SRC=d.src||'normal';
  // ž†Äžě•Žźú žßĄŽŹĄžĚė Žč®žĖī ŽćįžĚīŪĄįŽ•ľ Ž®ľž†Ä ŪôēŽ≥ī (ŪēīžĄ§žö© ŽúĽ/žĖīžõź)
  Promise.all(keys().map(getDay)).then(function(){
    Q = d.Q.map(function(qd){
      var w = findWordById(qd.wid, qd.wkey);
      var q = { w:w, opts:qd.opts, kind:qd.kind };
      if(qd.ans!==null && qd.ans!==undefined) q.ans=qd.ans;
      if(qd.need!==null && qd.need!==undefined) q.need=qd.need;
      if(qd.isPhrase!==null && qd.isPhrase!==undefined) q.isPhrase=qd.isPhrase;
      return q;
    });
    qi=d.qi; ans=d.ans; wrongs=d.wrongs||[]; fin=false;
    hide();
    show('qscr');
    draw();
  }).catch(function(){
    // Ž°úŽďú žč§ŪĆ®ŪēīŽŹĄ ž†Äžě•Žźú optsŽ°ú žĶúžÜĆ žßĄŪĖČ
    Q = d.Q.map(function(qd){
      return { w:findWordById(qd.wid, qd.wkey), opts:qd.opts, kind:qd.kind,
               ans:(qd.ans!==null&&qd.ans!==undefined?qd.ans:undefined),
               need:(qd.need!==null&&qd.need!==undefined?qd.need:undefined),
               isPhrase:(qd.isPhrase!==null&&qd.isPhrase!==undefined?qd.isPhrase:undefined) };
    });
    qi=d.qi; ans=d.ans; wrongs=d.wrongs||[]; fin=false;
    hide(); show('qscr'); draw();
  });
  return true;
}
// Žč®žĖīŽ•ľ idŽ°ú žįĺÍłį (ŪėĄžě¨ Ž°úŽďúŽźú CACHE žöįžĄ†, žóÜžúľŽ©ī ž†Ą Ž≤ĒžúĄ ŪÉźžÉČžĚÄ žÉĚŽěĶ)
function findWordById(id, wkey){
  for(var k in CACHE){
    var arr=CACHE[k];
    for(var i=0;i<arr.length;i++){
      if(arr[i].id===id && arr[i].w===wkey) return arr[i];
    }
  }
  // fallback: žĶúžÜĆ ž†ēŽ≥īŽ°ú ÍĶ¨žĄĪ
  return {id:id, w:wkey, m:'', s:[], p:[], r:''};
}

// ---- ŽŹôžĚėžĖī Žß§žĻ≠: ž†ēŽčĶ ŽŹôžĚėžĖī + žė§ŽčĶ(Žč§Ž•ł Žč®žĖīžĚė ŽŹôžĚėžĖī) ----
function buildSyn(w){
  var pairs = (w.p && w.p.length) ? w.p : [{d:w.m, s:w.s||[]}];

  // ŽŹôžĚėžĖī -> Í∑ł ŽŹôžĚėžĖīÍįÄ žÜćŪēú ŽúĽ Žß§ŪēĎ
  var senseOf = {};
  var all = [];
  pairs.forEach(function(pr){
    (pr.s||[]).forEach(function(t){
      var k = t.toLowerCase().trim();
      if(!k || senseOf[k]) return;
      senseOf[k] = pr.d;
      all.push(t);
    });
  });
  if(!all.length) all = (w.s||[]).slice();

  var right = shuf(all).slice(0,3);

  var seen={};
  seen[w.w.toLowerCase()]=1;
  all.forEach(function(t){ seen[t.toLowerCase()]=1; });   // žēą ŽĹĎŪěĆ ŽŹôžĚėžĖīŽŹĄ žė§ŽčĶ ÍłąžßÄ

  var need = 6 - right.length;
  // ž†ēŽčĶžĚī ŪĎúŪėĄžĚīŽ©ī žė§ŽčĶŽŹĄ ŪĎúŪėĄžóźžĄú, Žč®žĖīŽ©ī Žč®žĖīžóźžĄú
  var srcPool = (w.type==='phrase') ? POOL.phrases : POOL.words;
  if(srcPool.length<2) srcPool = POOL.all;  // Í∑ĻŽč®ž†Ā Ž∂Äž°ĪžčúŽßĆ fallback
  var wrong=[], cand=shuf(srcPool);
  // 1žį®: ŽúĽžĚĄ žēĄŽäĒ Žč®žĖīŽßĆ žė§ŽčĶžúľŽ°ú (defOfÍįÄ žěąŽäĒ Í≤É)
  for(var i=0;i<cand.length && wrong.length<need;i++){
    var c=cand[i];
    if(c.w===w.w) continue;
    var src = (c.s&&c.s.length) ? c.s : [c.w];
    // žĚī Žč®žĖīžĚė ŽŹôžĚėžĖī ž§Ď ŽúĽžĚī žěąŽäĒ Í≤É žöįžĄ†
    var withDef = src.filter(function(t){ return defOf(t); });
    var pool2 = withDef.length ? withDef : [];
    if(!pool2.length) continue;
    var pick = pool2[Math.floor(Math.random()*pool2.length)];
    if(!pick||seen[pick.toLowerCase()]) continue;
    seen[pick.toLowerCase()]=1;
    wrong.push(pick);
  }
  // 2žį®: Ž∂Äž°ĪŪēėŽ©ī ŽúĽ žóÜŽäĒ Í≤ÉŽŹĄ Ūóąžö©
  for(var i2=0;i2<cand.length && wrong.length<need;i2++){
    var c2=cand[i2];
    if(c2.w===w.w) continue;
    var src2 = (c2.s&&c2.s.length) ? c2.s : [c2.w];
    var pick2=src2[Math.floor(Math.random()*src2.length)];
    if(!pick2||seen[pick2.toLowerCase()]) continue;
    seen[pick2.toLowerCase()]=1;
    wrong.push(pick2);
  }
  var opts=shuf(right.concat(wrong)).map(function(t){
    var ok = right.indexOf(t)>=0;
    return {
      t: t,
      ok: ok,
      sense: ok ? (senseOf[t.toLowerCase().trim()] || '') : '',   // ž†ēŽčĶ: Ž©ĒžĚł Žč®žĖīžĚė žĖīŽäź ŽúĽ
      def:  ok ? '' : defOf(t)                                      // žė§ŽčĶ: Í∑ł Žč®žĖī žěźž≤īžĚė ŽúĽ
    };
  });
  return {w:w, opts:opts, need:right.length, kind:'syn'};
}

function buildQuiz(w){
  // ž†ēŽčĶžĚī ŪĎúŪėĄžĚīŽ©ī žė§ŽčĶŽŹĄ ŽįėŽďúžčú ŪĎúŪėĄŽĀľŽ¶¨, Žč®žĖīŽ©ī ŽįėŽďúžčú Žč®žĖīŽĀľŽ¶¨
  var isPhrase = (w.type==='phrase');
  var basePool = isPhrase ? POOL.phrases : POOL.words;
  if(basePool.length<2) basePool = POOL.all;  // Í∑ĻŽč®ž†ĀžúľŽ°ú 1ÍįúŽŅźžĚīŽ©ī žĖīž©Ē žąė žóÜžĚī ž†Ąž≤ī
  var seen={}; seen[w.m]=1;
  var d=[], cand=shuf(basePool);

  if(isPhrase){
    // ŪĎúŪėĄ Ž¨łž†ú: žú†žā¨ŽŹĄ Í≥Ąžāį Ž∂ąŪēĄžöĒ (ŽúĽžĚī ŽĻĄžä∑Ūēú ŪĎúŪėĄŽď§žĚÄ žĚīŽĮł ŽŹôžĚėžĖīŽ°ú Ž¨∂žó¨ žěąžĚĆ)
    // ž†ēŽčĶžĚė Ž™ÖžčúŽźú ŽŹôžĚėžĖīŽď§ŽßĆ žė§ŽčĶžóźžĄú ž†úžôłŪēėÍ≥†, ŽāėŽ®łžßÄŽäĒ Í∑łŽÉ• ŪíÄžóźžĄú ŽĹĎžēĄ žĪĄžöīŽč§.
    var synSet = {};
    if(w.s) w.s.forEach(function(t){ synSet[String(t).toLowerCase().trim()]=1; });
    if(w.p) w.p.forEach(function(pr){ if(pr.s) pr.s.forEach(function(t){ synSet[String(t).toLowerCase().trim()]=1; }); });
    for(var i=0;i<cand.length&&d.length<4;i++){
      var c=cand[i];
      if(c.w===w.w||seen[c.m]) continue;
      if(synSet[String(c.w).toLowerCase().trim()]) continue;  // ž†ēŽčĶžĚė ŽŹôžĚėžĖī ‚Üí ž†úžôł
      seen[c.m]=1; d.push({m:c.m, w:c.w});
    }
  } else {
    // Žč®žĖī Ž¨łž†ú: Íłįž°īŽĆÄŽ°ú ŽúĽ žú†žā¨ŽŹĄ ŪēĄŪĄį (Ūēú ÍłÄžěź ŽúĽ ŽďĪ Í≤ĻžĻ† žúĄŪóėžĚī ŪĀ¨ŽĮÄŽ°ú)
    for(var ii=0;ii<cand.length&&d.length<4;ii++){
      var cc=cand[ii];
      if(cc.w===w.w||seen[cc.m]) continue;
      if(tooSimilar(w.m, cc.m)) continue;
      var dup=false;
      for(var j=0;j<d.length;j++){ if(tooSimilar(d[j].m, cc.m)){ dup=true; break; } }
      if(dup) continue;
      seen[cc.m]=1; d.push({m:cc.m, w:cc.w});
    }
    // 2žį®: Ž∂Äž°ĪŪēėŽ©ī ž°įÍĪī žôĄŪôĒ
    for(var i2=0;i2<cand.length&&d.length<4;i2++){
      var c2=cand[i2];
      if(c2.w===w.w||seen[c2.m]) continue;
      if(tooSimilar(w.m, c2.m)) continue;
      seen[c2.m]=1; d.push({m:c2.m, w:c2.w});
    }
  }
  // Ž≥īÍłį: {t:ŪĎúžčúŪē† ŽúĽ, ok:ž†ēŽčĶ žó¨Ž∂Ä, srcw:Í∑ł ŽúĽžĚĄ ÍįÄžßĄ Žč®žĖī/ŪĎúŪėĄ}
  var opts = shuf([{m:w.m, w:w.w, ok:true}].concat(d.map(function(x){return {m:x.m, w:x.w, ok:false};})))
    .map(function(o){ return {t:o.m, ok:o.ok, srcw:o.w}; });
  var ansIdx = opts.map(function(o){return o.ok;}).indexOf(true);
  return {w:w, opts:opts, ans:ansIdx, kind:'quiz', isPhrase:isPhrase};
}

function tagOf(w){
  return w.src==='Y' ? (w.vol+'Í∂Ć '+w.day+'Íįē') : ('MVP'+w.src.slice(-1));
}

function draw(){
  if(fin) return;
  var q=Q[qi];
  sel={};  // žĚīž†Ą Ž¨łž†úžĚė žĄ†ŪÉĚžĚī Žā®žßÄ žēäŽŹĄŽ°Ě žīąÍłįŪôĒ
  // next Ž≤ĄŪäľ žÉĀŪÉú žīąÍłįŪôĒ
  var nx=$('next');
  if(nx){ nx.textContent='‚Ė∂'; nx.classList.remove('fbtn'); }
  $('tag').textContent=tagOf(q.w)+' ¬∑ #'+q.w.id;
  $('qw').textContent=q.w.w;
  $('cnt').textContent=(qi+1)+' / '+Q.length;
  $('fb').textContent='';
  $('info').classList.remove('on');
  $('info').innerHTML='';
  $('prog').firstElementChild.style.width=(qi/Q.length*100)+'%';

  var box=$('ch'); box.innerHTML='';

  if(q.kind==='syn'){
    $('ask').textContent = 'ŽŹôžĚėžĖīŽ•ľ Ž™®ŽĎź Í≥†Ž•īžĄłžöĒ (ž†ēŽčĶ '+q.need+'Íįú)';
    q.opts.forEach(function(o,i){
      var b=document.createElement('button');
      b.className='c'; b.textContent=o.t;
      b.onclick=(function(k){return function(){ toggle(k); };})(i);
      box.appendChild(b);
    });
    var sb=document.createElement('button');
    sb.id='sub'; sb.style.cssText='margin-top:6px;width:100%;padding:11px';
    sb.textContent='ž†úž∂ú';
    sb.onclick=submitSyn;
    box.appendChild(sb);
  } else {
    $('ask').textContent = q.isPhrase ? 'žĚī ŪĎúŪėĄžĚė ŽúĽžĚÄ?' : 'žĚī Žč®žĖīžĚė ŽúĽžĚÄ?';
    q.opts.forEach(function(o,i){
      var b=document.createElement('button');
      b.className='c';
      b.textContent = (typeof o==='string') ? o : (o && o.t ? o.t : '');
      b.onclick=(function(k){return function(){ pick(k); };})(i);
      box.appendChild(b);
    });
  }

  score();
  if(ans[qi]!==null){ replay(); maybeShowFinishBtn(); }
}

function toggle(i){
  if(ans[qi]!==null) return;
  var bs=$('ch').querySelectorAll('button.c');
  sel[i]=!sel[i];
  bs[i].classList.toggle('sel', !!sel[i]);
}

function submitSyn(){
  if(ans[qi]!==null) return;
  var q=Q[qi];
  var chosen=[];
  for(var k in sel) if(sel[k]) chosen.push(parseInt(k));
  if(!chosen.length){ $('fb').textContent='ŪēėŽāė žĚīžÉĀ Í≥†Ž•īžĄłžöĒ'; return; }

  var ok=true;
  q.opts.forEach(function(o,i){
    var picked=chosen.indexOf(i)>=0;
    if(o.ok!==picked) ok=false;
  });
  ans[qi]={sel:chosen, ok:ok};
  if(!ok){
    wrongs.push({w:q.w, mine:chosen.map(function(i){return q.opts[i].t;}).join(', '), kind:'syn'});
    bankAdd('syn', q.w);
    statsWrong(q.w);
  } else {
    bankDel('syn', q.w);
    statsRight(q.w);
  }
  bankSave();
  replay();
  score();
  maybeShowFinishBtn();
  sessionSave();
}

function pick(i){
  if(fin||ans[qi]!==null) return;
  var q=Q[qi];
  var ok=(i===q.ans);
  ans[qi]={sel:i, ok:ok};
  if(!ok){
    var mineT = (typeof q.opts[i]==='string') ? q.opts[i] : q.opts[i].t;
    wrongs.push({w:q.w, mine:mineT, kind:'quiz'});
    bankAdd('quiz', q.w);
    statsWrong(q.w);
  } else {
    bankDel('quiz', q.w);
    statsRight(q.w);
  }
  bankSave();
  replay();
  score();
  maybeShowFinishBtn();
  sessionSave();
}

// Ž™®Žď† Ž¨łž†úŽ•ľ Žč§ ŪíÄžóąžúľŽ©ī next Ž≤ĄŪäľžĚĄ 'Í≤įÍ≥ľ Ž≥īÍłį'Ž°ú ŽįĒÍŅĒ ŽÖłž∂ú
function maybeShowFinishBtn(){
  var allDone = ans.every(function(a){return a!==null;});
  var nx=$('next');
  if(allDone && nx){
    nx.textContent='Í≤įÍ≥ľ Ž≥īÍłį ūüŹĀ';
    nx.classList.add('fbtn');
  }
}

function replay(){
  var q=Q[qi], a=ans[qi];
  var bs=$('ch').querySelectorAll('button.c');
  var sub=$('sub');
  if(sub) sub.style.display='none';

  for(var i=0;i<bs.length;i++){
    bs[i].disabled=true; bs[i].onclick=null;
    bs[i].classList.remove('sel');
    if(q.kind==='syn'){
      var picked=a.sel.indexOf(i)>=0;
      // ž†ēŽčĶ: žúĄžóź 'Ž©ĒžĚł Žč®žĖīžĚė žĖīŽäź ŽúĽ' / žė§ŽčĶ: žėÜžóź 'Í∑ł Žč®žĖīžĚė ŽúĽ'
      var o=q.opts[i];
      if(o.ok && o.sense){
        bs[i].innerHTML='<em class="sns">'+esc(o.sense)+'</em>'+esc(o.t);
      } else if(!o.ok && o.def){
        bs[i].innerHTML=esc(o.t)+'<em class="od">'+esc(o.def)+'</em>';
      }
      if(q.opts[i].ok && picked) bs[i].classList.add('ok');
      else if(q.opts[i].ok && !picked) bs[i].classList.add('miss');
      else if(!q.opts[i].ok && picked) bs[i].classList.add('no');
      else bs[i].classList.add('dim');
    } else {
      // ŽčĶ Í≥ĶÍįú: ÍįĀ Ž≥īÍłį ŽúĽžĚī žĖīŽäź Žč®žĖī/ŪĎúŪėĄžĚė Í≤ÉžĚłžßÄ Ūē®ÍĽė Ž≥īžó¨ ž§Ć
      var o=q.opts[i];
      if(o && typeof o==='object' && o.srcw && !o.ok){
        bs[i].innerHTML=esc(o.t)+'<em class="od">'+esc(o.srcw)+'</em>';
      }
      if(i===q.ans) bs[i].classList.add('ok');
      else if(i===a.sel) bs[i].classList.add('no');
      else bs[i].classList.add('dim');
    }
  }
  $('fb').textContent = a.ok ? '‚úÖ ž†ēŽčĶ!' : '‚ĚĆ žė§ŽčĶ';

  var w=q.w, h='';
  h += (q.kind==='syn') ? renderPairs(w, null) : renderFlat(w);
  if(w.r) h+='<div class="r" style="margin-top:7px">'+esc(w.r)+'</div>';
  // ŪĎúŪėĄ(ÍĶ¨Ž¨ł)žĚīŽ©ī žėąŽ¨ł žěźŽ¶¨ ŽßąŽ†® ‚Üí ŽĻĄŽŹôÍłįŽ°ú žĪĄžõÄ
  if(w.type==='phrase'){
    h+='<div class="ex" id="exBox">ūüďĚ žėąŽ¨ł ž§ÄŽĻĄ ž§Ď‚Ä¶</div>';
  }
  $('info').innerHTML=h;
  $('info').classList.add('on');
  $('prog').firstElementChild.style.width=((qi+1)/Q.length*100)+'%';
  if(w.type==='phrase') fillExample(w);
}

// ŪĎúŪėĄ žėąŽ¨ł: ŽćįžĚīŪĄįžĚė ex ŪēĄŽďúŽ•ľ ŪĎúžčú (ŽĮłŽ¶¨ ŽßĆŽď§žĖī ŽćįžĚīŪĄįžóź ŽĄ£žĚĆ)
function fillExample(w){
  var box=$('exBox'); if(!box) return;
  if(w.ex && w.ex.en){
    var h='<b>'+esc(w.ex.en)+'</b>';
    if(w.ex.ko) h+='<br><span class="exko">'+esc(w.ex.ko)+'</span>';
    box.innerHTML='ūüďĚ '+h;
  } else {
    box.style.display='none';  // žėąŽ¨ł žóÜžúľŽ©ī žą®ÍĻÄ
  }
}

function score(){
  var d=0, o=0;
  ans.forEach(function(a){ if(a!==null){ d++; if(a.ok) o++; } });
  $('bar').textContent='ž†źžąė '+o+' / '+d+'   ¬∑   '+(d?Math.round(o/d*100)+'%':'-');
}

function next(){
  if(fin) return;
  sel={};
  if(qi<Q.length-1){ qi++; draw(); sessionSave(); }
  else{
    var u=ans.indexOf(null);
    if(u!==-1){ qi=u; draw(); sessionSave(); } else finish();
  }
}
function prev(){ if(!fin&&qi>0){ sel={}; qi--; draw(); sessionSave(); } }

function finish(){
  if(fin) return;
  fin=true;
  sessionClear();
  var o=0;
  ans.forEach(function(a){ if(a&&a.ok) o++; });
  var p=Math.round(o/Q.length*100);
  $('rs').textContent=o+' / '+Q.length;
  $('rp').textContent=p+'%';

  var m = st.mode;
  var left = (m==='card') ? 0 : bankList(m).length;
  var tail = (m!=='card') ? '  ¬∑  ŽąĄž†Ā žė§ŽčĶ ' + left + 'Íįú' : '';
  if(SRC==='bank'){
    $('rm').textContent = 'ŽąĄž†Ā žė§ŽčĶ ŪíÄÍłį žôĄŽ£Ć' + tail;
  } else if(SRC==='retry'){
    $('rm').textContent = 'žė§ŽčĶ žě¨žčúŽŹĄ žôĄŽ£Ć' + tail;
  } else {
    $('rm').textContent = (p>=90?'žôĄŽ≤ĹŪēīžöĒ ūüéä' : p>=70?'ÍĪįžĚė Žč§ žôĒžĖīžöĒ ūüí™' : 'ŪčÄŽ¶į Í≤ÉŽ∂ÄŪĄį Žč§žčú Ž≥īžĄłžöĒ ūüďĆ') + tail;
  }

  $('retry').style.display = wrongs.length ? '' : 'none';
  $('wbtn').style.display = wrongs.length ? '' : 'none';
  $('wrong').style.display='none';
  show('resscr');
}

function showWrong(){
  var b=$('wi'); b.innerHTML='';
  if(!wrongs.length){ b.innerHTML='<div class="done">ž†ĄŽ∂Ä ŽßěŪėĒžĖīžöĒ ūüéČ</div>'; }
  wrongs.forEach(function(x){
    var w=x.w, d=document.createElement('div');
    d.className='wi';
    var h='<div class="n">'+tagOf(w)+' ¬∑ #'+w.id+'</div>'+
          '<div class="w">'+esc(w.w)+'</div>'+
          '<div class="x">Žāī ŽčĶ: '+esc(x.mine)+'</div>'+
          ((x.kind==='quiz') ? renderFlat(w) : renderPairs(w, null));
    if(w.r) h+='<div class="r" style="margin-top:6px">'+esc(w.r)+'</div>';
    d.innerHTML=h; b.appendChild(d);
  });
  $('wrong').style.display='block';
  $('wrong').scrollIntoView({behavior:'smooth'});
}

// ---- ŪĒĆŽěėžčúžĻīŽďú ----
function drawCard(){
  var w=SET[CI];
  $('cn1').textContent='#'+w.id;
  $('cn2').textContent='#'+w.id;
  $('cw').textContent=w.w;
  $('cm').textContent=w.m;
  var cs=$('cs'), cr=$('cr');
  if(w.s&&w.s.length){ cs.textContent=w.s.join(', '); cs.style.display=''; } else cs.style.display='none';
  if(w.r){ cr.textContent=w.r; cr.style.display=''; } else cr.style.display='none';
  $('ccnt').textContent=(CI+1)+' / '+SET.length;
  $('cbar').textContent=tagOf(w)+' ¬∑ žĄłŪäł '+(st.set+1);
  $('cprog').firstElementChild.style.width=((CI+1)/SET.length*100)+'%';
  $('cinner').classList.remove('flip');
}

});

$('qhome').addEventListener('click',function(){ bankUI(); statsUI(); resumeUI(); show('setup'); });

// ŪõĎžĖīŽ≥īÍłį
$('brhome').addEventListener('click',function(){ show('setup'); });
$('rthome').addEventListener('click',function(){ show('setup'); });
$('sthome').addEventListener('click',function(){ show('setup'); });
$('resumeGo').addEventListener('click',function(){
  if(!sessionResume()){ msg('žĚīžĖī ŪíÄ ŪÄīž¶ąÍįÄ žóÜžäĶŽčąŽč§','err'); resumeUI(); }
});
$('resumeClr').addEventListener('click',function(){ sessionClear(); resumeUI(); });
$('statsView').addEventListener('click',function(){ stFilter='all'; document.querySelectorAll('.stf').forEach(function(b){b.classList.toggle('on',b.dataset.f==='all');}); drawStats(); show('statsscr'); });
$('statsClr').addEventListener('click',function(){
  var n=statsList().length;
  if(!n){ return; }
  if(!confirm('žēĹž†ź Žč®žĖī ÍłįŽ°Ě '+n+'ÍįúŽ•ľ Ž™®ŽĎź žßÄžöłÍĻĆžöĒ?')) return;
  STATS={}; statsSave(); statsUI();
});

  var b=e.target.closest('.stf'); if(!b) return;
  stFilter=b.dataset.f;
  document.querySelectorAll('.stf').forEach(function(x){ x.classList.toggle('on', x===b); });
  drawStats();
});

$('wsubmit').addEventListener('click',writeSubmit);

$('bankClr').addEventListener('click',function(){
  var m=st.mode;
  if(m==='card') return;
  var n=bankList(m).length;
  if(!n) return;
  if(!confirm('ŽąĄž†Ā žė§ŽčĶ '+n+'ÍįúŽ•ľ Ž™®ŽĎź žßÄžöłÍĻĆžöĒ?')) return;
  BANK[m]={};
  bankSave();
  bankUI();
});

document.addEventListener('keydown',function(e){
  if($('cardscr').classList.contains('on')){
    if(e.key===' '){ e.preventDefault(); $('cinner').classList.toggle('flip'); }
    else if(e.key==='ArrowRight'&&CI<SET.length-1){ CI++; drawCard(); }
    else if(e.key==='ArrowLeft'&&CI>0){ CI--; drawCard(); }
    return;
  }
  if(!$('qscr').classList.contains('on')||fin) return;
  var q=Q[qi];
  if(e.key>='1'&&e.key<='6'){
    var i=parseInt(e.key)-1;
    if(q.kind==='syn'){ if(i<q.opts.length) toggle(i); }
    else if(i<4) pick(i);
  }
  else if(e.key==='Enter'){
    e.preventDefault();
    if(q.kind==='syn'&&ans[qi]===null) submitSyn();
    else next();
  }
  else if(e.key==='ArrowRight'){ e.preventDefault(); next(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); prev(); }
});

boot();
